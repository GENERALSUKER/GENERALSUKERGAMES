<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Idiom Master: Chaos Mode</title>
    <style>
        :root {
            --primary: #6c5ce7;
            --secondary: #a29bfe;
            --bg: #f0f2f5;
            --card: #ffffff;
            --text: #2d3436;
            --success: #00b894;
            --error: #d63031;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        #game-container {
            background: var(--card);
            padding: 35px;
            border-radius: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 90%;
            text-align: center;
            border-top: 8px solid var(--primary);
        }

        .level-indicator {
            display: inline-block;
            background: var(--secondary);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: bold;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .question-text {
            font-size: 1.25rem;
            color: var(--text);
            margin: 20px 0;
            line-height: 1.4;
            min-height: 60px;
        }

        .answer-zone { margin: 25px 0; }

        input[type="text"] {
            width: 100%;
            padding: 14px;
            border: 2px solid #dfe6e9;
            border-radius: 12px;
            font-size: 1.1rem;
            text-align: center;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(108, 92, 231, 0.2); }

        .options-grid { display: grid; gap: 10px; }

        .btn {
            padding: 14px 20px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 1rem;
            transition: 0.2s;
        }

        .btn-check { background: var(--primary); color: white; width: 100%; margin-top: 10px; }
        .btn-check:hover { background: #5b4bc4; }

        .btn-opt { background: white; border: 2px solid #dfe6e9; width: 100%; }
        .btn-opt:hover { border-color: var(--primary); background: #f9f8ff; }

        .btn-next { background: var(--success); color: white; width: 100%; margin-top: 20px; }

        #feedback { font-weight: bold; margin-top: 15px; height: 24px; }

        .hidden { display: none; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="type-badge" class="level-indicator">Ready?</div>
    <div id="question-text" class="question-text">Press the button to start!</div>
    
    <div id="answer-zone" class="answer-zone">
        <button class="btn btn-check" onclick="nextRandomQuestion()">Start Game</button>
    </div>

    <div id="feedback"></div>
    <button id="next-btn" class="btn btn-next hidden" onclick="nextRandomQuestion()">Next Random Challenge →</button>
</div>

<script>
    // Base de datos estática de 25 preguntas (5 idioms x 5 niveles)
    const quizData = [
        // IDIOM: To start from scratch
{ type: 1, q: "Definition: 'To start from scratch' means...", opts: ["To finish quickly", "To begin from the very beginning", "To scratch an itch"], ans: "To begin from the very beginning" },
{ type: 2, q: "Complete: 'They had to start...'", ans: "from scratch" },
{ type: 3, q: "Translate 'Empezar desde cero' to English:", ans: "to start from scratch" },
{ type: 4, q: "Context: The recipe failed, so I threw it away to...", ans: "start from scratch" },
{ type: 5, q: "Dialogue:<br>A: Can we save any part of this project?<br>B: No, we need to ___ ___ ___.", ans: "start from scratch" },

{ type: 1, q: "Definition: 'To shoot the breeze' means...", opts: ["To argue loudly", "To talk about unimportant things", "To go hunting"], ans: "To talk about unimportant things" },
{ type: 2, q: "Complete: 'We spent the afternoon shooting ...'", ans: "the breeze" },
{ type: 3, q: "Translate 'Hablar por hablar' to English:", ans: "To shoot the breeze" },
{ type: 4, q: "Context: They weren't working; they were just standing there to...", ans: "shoot the breeze" },
{ type: 5, q: "Dialogue:<br>A: Are you guys discussing the contract?<br>B: No, we are just here to ___ ___ ___.", ans: "shoot the breeze" },
 
// IDIOM: The straw that broke the camel's back
{ type: 1, q: "Definition: 'The straw that broke the camel's back' is...", opts: ["A heavy load", "The last small problem that makes everything fail", "A desert animal's problem"], ans: "The last small problem that makes everything fail" },
{ type: 2, q: "Complete: 'I was already stressed, but that email was the straw that broke the...'", ans: "camel's back" },
{ type: 3, q: "Translate 'La gota que colmó el vaso' to English:", ans: "the straw that broke the camel's back" },
{ type: 4, q: "Context: He had many problems, but losing his keys was finally the...", ans: "straw that broke the camel's back" },
{ type: 5, q: "Dialogue:<br>A: Why did she quit today?<br>B: The broken coffee machine was the ___ ___ ___ ___ ___ ___ ___.", ans: "straw that broke the camel's back" },

// IDIOM: Bread and butter
{ type: 1, q: "Definition: Someone's 'bread and butter' is...", opts: ["Their favorite food", "Their main source of income", "A quick snack"], ans: "Their main source of income" },
{ type: 2, q: "Complete: 'Teaching is my bread and...'", ans: "butter" },
{ type: 3, q: "Translate 'El sustento / Lo que me da de comer' to English:", ans: "bread and butter" },
{ type: 4, q: "Context: I write novels, but technical writing is my...", ans: "bread and butter" },
{ type: 5, q: "Dialogue:<br>A: Do you make much money with photography?<br>B: No, weddings are my real ___ ___ ___.", ans: "bread and butter" },

// IDIOM: Not rocket science
{ type: 1, q: "Definition: 'It's not rocket science' means...", opts: ["It's very easy to understand", "It's a space mission", "It's an expensive project"], ans: "It's very easy to understand" },
{ type: 2, q: "Complete: 'Just press the button; it's not rocket...'", ans: "science" },
{ type: 3, q: "Translate 'No es nada del otro mundo / No es tan difícil' to English:", ans: "it's not rocket science" },
{ type: 4, q: "Context: You don't need a PhD to fix this; it's...", ans: "not rocket science" },
{ type: 5, q: "Dialogue:<br>A: I can't learn how to use this app.<br>B: Come on, it's ___ ___ ___.", ans: "not rocket science" },

// IDIOM: Between a rock and a hard place / Between the devil and the deep blue sea
{ type: 1, q: "Definition: Being 'between a rock and a hard place' means...", opts: ["Being in a cave", "Having to choose between two bad options", "Being very strong"], ans: "Having to choose between two bad options" },
{ type: 2, q: "Complete: 'If I stay I'm unhappy, if I leave I'm broke. I'm between a rock and a...'", ans: "hard place" },
{ type: 3, q: "Translate 'Entre la espada y la pared' to English:", ans: "to be between a rock and a hard place" },
{ type: 4, q: "Context: Both choices are terrible. I'm really...", ans: "between a rock and a hard place" },
{ type: 5, q: "Dialogue:<br>A: Are you going to the meeting or the wedding?<br>B: I can't do both! I'm ___ ___ ___ ___ ___ ___ ___.", ans: "between a rock and a hard place" },

// IDIOM: To sit on the fence
{ type: 1, q: "Definition: 'To sit on the fence' means...", opts: ["To be undecided", "To be outdoors", "To build a wall"], ans: "To be undecided" },
{ type: 2, q: "Complete: 'You need to choose a side! Don't sit on the...'", ans: "fence" },
{ type: 3, q: "Translate 'No mojarse / Estar indeciso' to English:", ans: "to sit on the fence" },
{ type: 4, q: "Context: He won't say if he agrees or not; he's just...", ans: "sitting on the fence" },
{ type: 5, q: "Dialogue:<br>A: Which candidate do you prefer?<br>B: I'm still ___ ___ ___.", ans: "sitting on the fence" },
 
// IDIOM: To be on the ball
{ type: 1, q: "Definition: 'To be on the ball' means...", opts: ["To play sports", "To be alert and efficient", "To be round"], ans: "To be alert and efficient" },
{ type: 2, q: "Complete: 'She's doing a great job; she's really on the...'", ans: "ball" },
{ type: 3, q: "Translate 'Estar al tanto / Estar pilas' to English:", ans: "to be on the ball" },
{ type: 4, q: "Context: You caught the error before anyone else. You are really...", ans: "on the ball" },
{ type: 5, q: "Dialogue:<br>A: Did you finish the report already?<br>B: Yes, I wanted to stay ___ ___ ___.", ans: "on the ball" },

// IDIOM: To call it a day
{ type: 1, q: "Definition: 'To call it a day' means...", opts: ["To check the calendar", "To stop working on something", "To wake up early"], ans: "To stop working on something" },
{ type: 2, q: "Complete: 'I'm exhausted. Let's call it a...'", ans: "day" },
{ type: 3, q: "Translate 'Dar algo por terminado (por hoy)' to English:", ans: "to call it a day" },
{ type: 4, q: "Context: We've been practicing for six hours. It's time to...", ans: "call it a day" },
{ type: 5, q: "Dialogue:<br>A: We still have two pages to fix.<br>B: No, I'm too tired. Let's ___ ___ ___ ___.", ans: "call it a day" },

// IDIOM: The more the merrier
{ type: 1, q: "Definition: 'The more the merrier' means...", opts: ["More people make an occasion better", "Christmas is coming", "To be very happy alone"], ans: "More people make an occasion better" },
{ type: 2, q: "Complete: 'Can I bring my sister? Of course! The more the...'", ans: "merrier" },
{ type: 3, q: "Translate 'Cuantos más, mejor' to English:", ans: "the more the merrier" },
{ type: 4, q: "Context: You are invited, and your friends are too. After all,...", ans: "the more the merrier" },
{ type: 5, q: "Dialogue:<br>A: Is it okay if five of us join the dinner?<br>B: Sure! ___ ___ ___ ___.", ans: "the more the merrier" },

// IDIOM: To be over the moon
{ type: 1, q: "Definition: 'To be over the moon' means...", opts: ["To be an astronaut", "To be extremely happy", "To be dreaming"], ans: "To be extremely happy" },
{ type: 2, q: "Complete: 'She got the job! She's over the...'", ans: "moon" },
{ type: 3, q: "Translate 'Estar loco de contento / Estar en las nubes' to English:", ans: "to be over the moon" },
{ type: 4, q: "Context: He just won the lottery and he is...", ans: "over the moon" },
{ type: 5, q: "Dialogue:<br>A: How did she react to the surprise?<br>B: She was ___ ___ ___.", ans: "over the moon" },

// IDIOM: Between the devil and the deep  (Alternative to Rock/Hard Place)
{ type: 1, q: "Definition: 'Between the devil and the deep' means...", opts: ["To be in a dilemma with two bad choices", "To be a professional diver", "To be lost at sea"], ans: "To be in a dilemma with two bad choices" },
{ type: 2, q: "Complete: 'I'm stuck between the devil and the...'", ans: "deep" },
{ type: 3, q: "Translate 'Entre la espada y la pared' to English:", ans: "between the devil and the deep" },
{ type: 4, q: "Context: I can't please my boss and I can't please my team. I'm...", ans: "between the devil and the deep" },
{ type: 5, q: "Dialogue:<br>A: You look trapped.<br>B: I am. I'm caught ___ ___ ___ ___ ___ ___.", ans: "between the devil and the deep" },

// IDIOM: The seal is broken
{ type: 1, q: "Definition: 'The seal is broken' often implies...", opts: ["A letter was opened", "The first step is taken and there's no stopping now", "To fix a bathroom"], ans: "The first step is taken and there's no stopping now" },
{ type: 2, q: "Complete: 'Well, I already ate one cookie, so the seal is...'", ans: "broken" },
{ type: 3, q: "Translate 'Se ha roto la veda / Ya no hay marcha atrás' to English:", ans: "the seal is broken" },
{ type: 4, q: "Context: We weren't going to spend money, but you bought a shirt. Now the...", ans: "seal is broken" },
{ type: 5, q: "Dialogue:<br>A: Are we going to keep ordering more food?<br>B: Yes! The ___ ___ ___.", ans: "seal is broken" },

// IDIOM: To be a bellend (Sutil: Comportarse como un tonto)
{ type: 1, q: "Definition: (UK Slang) 'To be a bellend' means to act...", opts: ["Like a hero", "In a stupid or annoying way", "Very quickly"], ans: "In a stupid or annoying way" },
{ type: 2, q: "Complete: 'Stop acting like a total...'", ans: "bellend" },
{ type: 3, q: "Translate 'Ser un cretino / tonto' (UK slang) to English:", ans: "to be a bellend" },
{ type: 4, q: "Context: He's being very rude and annoying to everyone. He's being a...", ans: "bellend" },
{ type: 5, q: "Dialogue:<br>A: Why is he shouting at the waiter?<br>B: Because he's a ___.", ans: "bellend" } 
 ];

    let currentQuestion = null;let questionsRemaining = [...quizData]; 
let totalAnswered = 0; // Contador de progreso

function nextRandomQuestion() {
    // Si ya no quedan preguntas, mostramos el final
    if (questionsRemaining.length === 0) {
        showEndScreen();
        return;
    }

    const randomIndex = Math.floor(Math.random() * questionsRemaining.length);
    currentQuestion = questionsRemaining.splice(randomIndex, 1)[0];
    
    // Actualizamos el badge para mostrar el progreso (ej: 1/25)
    totalAnswered++;
    const badge = document.getElementById('type-badge');
    badge.textContent = `Question ${totalAnswered} / 14`;

    const qText = document.getElementById('question-text');
    const zone = document.getElementById('answer-zone');
    const feedback = document.getElementById('feedback');
    const nextBtn = document.getElementById('next-btn');

    feedback.textContent = "";
    nextBtn.classList.add('hidden');
    zone.innerHTML = "";
    
    qText.innerHTML = currentQuestion.q;

if (currentQuestion.type === 1) {
        const grid = document.createElement('div');
        grid.className = "options-grid";
        currentQuestion.opts.forEach(opt => {
            const b = document.createElement('button');
            b.className = "btn btn-opt";
            b.textContent = opt;
            b.onclick = () => check(opt);
            grid.appendChild(b);
        });
        zone.appendChild(grid);
    } else {
        const input = document.createElement('input');
        input.type = "text";
        input.id = "user-input";
        input.placeholder = "Type here...";
        input.onkeyup = (e) => { if(e.key === "Enter") check(input.value) };
        
        const b = document.createElement('button');
        b.className = "btn btn-check";
        b.textContent = "Verify";
        b.onclick = () => check(input.value);
        
        zone.appendChild(input);
        zone.appendChild(b);
        input.focus();
    }
}

    function check(val) {
        const feedback = document.getElementById('feedback');
        const nextBtn = document.getElementById('next-btn');
        
        const userVal = val.toLowerCase().trim().replace(/[.!?]$/, "");
        const correctVal = currentQuestion.ans.toLowerCase().trim();

        if (userVal === correctVal) {
            feedback.textContent = "Correct! 🌟";
            feedback.style.color = "var(--success)";
            nextBtn.classList.remove('hidden');
        } else {
            feedback.textContent = "Incorrect, try again! ❌";
            feedback.style.color = "var(--error)";
        }
    }
    function showEndScreen() {
    const container = document.getElementById('game-container');
    container.innerHTML = `
        <div class="level-indicator">🏆 Finished!</div>
        <h2 class="question-text">¡Enhorabuena! Has completado los 14 desafíos de modismos.</h2>
        <p>Tu dominio del inglés está aumentando.</p>
        <button class="btn btn-check" onclick="location.reload()">Jugar de nuevo</button>
    `;
}
</script>
</body>
</html>
