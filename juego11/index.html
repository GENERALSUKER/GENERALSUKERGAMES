            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: var(--dark);

        #game-container {

            box-shadow: 0 20px 50px rgba(0,0,0,0.2);

            letter-spacing: 2px;

            font-family: 'Cinzel', serif;

            border: none;
            border-bottom: 2px solid var(--accent);
            background: transparent;
            text-align: center;
            outline: none;

            margin-top: 20px;
            max-height: 400px;

            padding: 10px;

            font-size: 0.9rem;

            justify-content: center;

            text-overflow: ellipsis;

            -webkit-box-orient: vertical;

            background: rgba(0,0,0,0.85);
            display: flex;
            justify-content: center;
            align-items: center;

            padding: 40px;

            width: 90%;

            border: none;

    let gameMode = "autor"; 
    let currentGameList = [];
    let currentIndex = 0;
    let score = 0;
    let timer;

    function showStart() {
        document.querySelectorAll('#game-container > div').forEach(div => div.classList.add('hidden'));
        document.getElementById('screen-start').classList.remove('hidden');
    }

    function setMode(mode) {
        gameMode = mode;
        startGame();
    }

    function startGame() {
        currentGameList = [...allRefranes].sort(() => 0.5 - Math.random()).slice(0, 5);
        currentIndex = 0;
        score = 0;
        document.getElementById('screen-start').classList.add('hidden');
        document.getElementById('screen-game').classList.remove('hidden');
        showQuestion();
    }

    function showQuestion() {
        const item = currentGameList[currentIndex];
        const display = document.getElementById('display-cita');
        const input = document.getElementById('user-input');
        
        document.getElementById('progress').innerText = `${currentIndex + 1} / ${currentGameList.length} ENIGMA`;
        
        if (gameMode === "autor") {
            display.innerText = `"${item.citaCompleta}"`;
            input.placeholder = "Filosofoaren abizena...";
        } else {
            display.innerHTML = `<span style="color:var(--accent); font-family:'Cinzel'">${item.autor}</span><br>"${item.citaInicio}"`;
            input.placeholder = "Esaldia osatu...";
        }

        input.value = "";
        input.disabled = false;
        document.getElementById('btn-submit').classList.remove('hidden');
        document.getElementById('feedback-area').classList.add('hidden');
        setTimeout(() => input.focus(), 100);
    }

    function normalizeText(str) {
        return str.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().trim().replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g,"");
    }

    function checkAnswer() {
        const userVal = normalizeText(document.getElementById('user-input').value);
        const item = currentGameList[currentIndex];
        const correctVal = normalizeText(gameMode === "autor" ? item.autor : item.citaFin);
        
        const feedbackMsg = document.getElementById('feedback-msg');
        document.getElementById('user-input').disabled = true;
        document.getElementById('btn-submit').classList.add('hidden');
        document.getElementById('feedback-area').classList.remove('hidden');

        if (userVal === correctVal || (userVal.length > 4 && correctVal.includes(userVal))) {
            feedbackMsg.innerText = "🏛️ Zuzen! Jakituria frogatua.";
            feedbackMsg.style.color = "var(--success)";
            saveProgress(item.id);
            score++;
        } else {
            feedbackMsg.innerText = `✘ Okerra. Erantzuna: ${gameMode === "autor" ? item.autor : item.citaFin}`;
            feedbackMsg.style.color = "var(--error)";
        }

        const disertacionFormateada = item.disertacion.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
        document.getElementById('explanation-text').innerHTML = `<strong>Disertazio Gida:</strong><br>${disertacionFormateada}`;
        startTimer();
    }

    function startTimer() {
        let timeLeft = 6;
        const timerMsg = document.getElementById('timer-msg');
        const btnNext = document.getElementById('btn-next');
        btnNext.classList.add('hidden');
        
        if (timer) clearInterval(timer);
        timer = setInterval(() => {
            timerMsg.innerText = `Hurrengo galdera prest ${timeLeft} segundotan...`;
            if (timeLeft <= 0) {
                clearInterval(timer);
                timerMsg.innerText = "";
                btnNext.classList.remove('hidden');
            }
            timeLeft--;
        }, 1000);
    }

    function nextQuestion() {
        currentIndex++;
        currentIndex < currentGameList.length ? showQuestion() : endGame();
    }

    function endGame() {
        document.getElementById('screen-game').classList.add('hidden');
        document.getElementById('screen-end').classList.remove('hidden');
        document.getElementById('final-score').innerText = `Emaitza: ${score} / ${currentGameList.length}`;
    }

    function saveProgress(id) {
        let unlocked = JSON.parse(localStorage.getItem('filo_eu_v1') || "[]");
        if (!unlocked.includes(id)) {
            unlocked.push(id);
            localStorage.setItem('filo_eu_v1', JSON.stringify(unlocked));
        }
    }

    function showGallery() {
        document.querySelectorAll('#game-container > div').forEach(div => div.classList.add('hidden'));
        document.getElementById('screen-gallery').classList.remove('hidden');
        const grid = document.getElementById('gallery-grid');
        const unlocked = JSON.parse(localStorage.getItem('filo_eu_v1') || "[]");
        
        document.getElementById('gallery-count').innerText = `${unlocked.length} / ${allRefranes.length} aipu aurkituta`;
        grid.innerHTML = "";

        allRefranes.forEach(item => {
            const isUnlocked = unlocked.includes(item.id);
            const card = document.createElement('div');
            card.className = `refran-card ${isUnlocked ? 'unlocked' : 'locked'}`;
            card.innerHTML = isUnlocked ? `<span style="font-size:0.8rem; font-style:italic;">"${item.citaCompleta}"</span>` : "🔒";
            if (isUnlocked) card.onclick = () => openModal(item);
            grid.appendChild(card);
        });
    }

    function openModal(item) {
        document.getElementById('modal-title').innerText = item.autor;
        document.getElementById('modal-subtitle').innerText = `"${item.citaCompleta}"`;
        const disertacionFormateada = item.disertacion.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
        document.getElementById('modal-desc').innerHTML = `<strong>Estrategia Akademikoa:</strong><br>${disertacionFormateada}`;
        document.getElementById('modal').classList.remove('hidden');
    }

    function closeModal() { document.getElementById('modal').classList.add('hidden'); }

    showStart();
</script>
