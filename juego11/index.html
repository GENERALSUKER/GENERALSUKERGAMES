<!DOCTYPE html>
<html lang="eu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agora: Egilea identifikatu eta Esaldia osatu</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Lora:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2c3e50; 
            --accent: #b8926a;  
            --success: #2d5a27; 
            --error: #8b0000;   
            --dark: #1a1a1a;
            --bg: #f4f1ea;      
            --paper: #ffffff;
        }

        body {
            font-family: 'Lora', serif;
            background-color: var(--bg);
            background-image: linear-gradient(30deg, #ebe7de 12%, transparent 12.5%, transparent 87%, #ebe7de 87.5%, #ebe7de), 
                              linear-gradient(150deg, #ebe7de 12%, transparent 12.5%, transparent 87%, #ebe7de 87.5%, #ebe7de), 
                              linear-gradient(60deg, #e0ddd3 25%, transparent 25.5%, transparent 75%, #e0ddd3 75%, #e0ddd3);
            background-size: 80px 140px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: var(--dark);
        }

        #game-container {
            background: var(--paper);
            padding: 3rem;
            border-radius: 2px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            border-left: 10px solid var(--primary);
            width: 90%;
            max-width: 750px;
            text-align: center;
            position: relative;
        }

        .hidden { display: none !important; }

        h1 { 
            font-family: 'Cinzel', serif; 
            font-size: 1.8rem;
            color: var(--primary); 
            margin-top: 0;
            border-bottom: 3px double var(--accent); 
            display: inline-block; 
            padding-bottom: 10px;
            letter-spacing: 2px;
        }

        #progress {
            font-family: 'Cinzel', serif;
            color: var(--accent);
            font-size: 0.8rem;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .refran-box {
            font-size: 1.3rem;
            margin: 30px 0;
            line-height: 1.6;
        }

        #display-cita {
            font-style: italic;
            color: var(--dark);
            display: block;
            margin-bottom: 25px;
            padding: 0 20px;
        }

        input[type="text"] {
            width: 80%;
            padding: 12px;
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            border: none;
            border-bottom: 2px solid var(--accent);
            background: transparent;
            text-align: center;
            outline: none;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px;
            margin-top: 20px;
            max-height: 400px;
            overflow-y: auto;
            padding: 10px;
        }

        .refran-card {
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100px;
            background: #fff;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.05);
            font-family: 'Cinzel', serif;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 4;
            -webkit-box-orient: vertical;
        }

        .refran-card.locked { background: #f0f0f0; color: #ccc; font-size: 1.5rem; }
        .refran-card.unlocked { border-color: var(--accent); color: var(--primary); }

        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal-content {
            background: white;
            padding: 40px;
            max-width: 600px;
            width: 90%;
            border-top: 5px solid var(--accent);
            text-align: left;
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 25px;
            font-family: 'Cinzel', serif;
            cursor: pointer;
            margin: 10px;
            transition: 0.3s;
            text-transform: uppercase;
        }

        button:hover { background: var(--accent); }

        .explanation {
            background: #fdfaf3;
            padding: 20px;
            border-left: 4px solid var(--accent);
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .timer-text { font-size: 0.85rem; color: #777; margin-top: 15px; font-family: 'Cinzel'; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="screen-start">
        <h1>Agora</h1>
        <p>Aukeratu zure erronka intelektuala:</p>
        <div style="display: flex; flex-direction: column; align-items: center; gap: 5px;">
            <button onclick="setMode('autor')">Egilea Identifikatu</button>
            <button onclick="setMode('completar')">Aipua Osatu</button>
            <button onclick="showGallery()" style="background:none; color:var(--accent); border:1px solid var(--accent); margin-top:15px;">Jakintsuen Ganbara (Galeria)</button>
        </div>
    </div>

    <div id="screen-game" class="hidden">
        <div id="progress"></div>
        <div class="refran-box">
            <span id="display-cita"></span>
            <input type="text" id="user-input" autocomplete="off">
        </div>
        <button id="btn-submit" onclick="checkAnswer()">Erantzuna Baieztatu</button>
        
        <div id="feedback-area" class="hidden">
            <div id="feedback-msg" style="padding: 10px; font-weight: bold; margin-bottom: 10px;"></div>
            <div id="explanation-text" class="explanation"></div>
            <div id="timer-msg" class="timer-text"></div>
            <button id="btn-next" class="hidden" onclick="nextQuestion()">Hurrengo Galdera</button>
        </div>
    </div>

    <div id="screen-gallery" class="hidden">
        <h1>Disertazio Liburutegia</h1>
        <p id="gallery-count" style="font-family: 'Cinzel'; color: var(--accent); margin-bottom: 20px;"></p>
        <div class="gallery-grid" id="gallery-grid"></div>
        <button onclick="showStart()" style="margin-top: 30px;">Hasierara Itzuli</button>
    </div>

    <div id="screen-end" class="hidden">
        <h1>Azterketaren Emaitza</h1>
        <p id="final-score" style="font-size: 1.8rem; margin: 20px 0; font-family: 'Cinzel';"></p>
        <button onclick="location.reload()">Berriro Saiatu</button>
    </div>
</div>

<div id="modal" class="modal hidden" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h3 id="modal-title" style="font-family: 'Cinzel'; color: var(--primary); margin: 0;"></h3>
        <p id="modal-subtitle" style="font-style: italic; color: var(--accent); margin: 10px 0 20px 0; border-bottom: 1px solid #eee; padding-bottom: 10px;"></p>
        <div id="modal-desc" class="explanation"></div>
        <button onclick="closeModal()" style="margin-top: 25px;">Itxi Liburua</button>
    </div>
</div>

<script>
    const allRefranes = [
        {   id: 1, autor: "Socrates", 
            citaCompleta: "Bakarkik dakit ezer ez dakidala.", 
            citaInicio: "Bakarrik dakit...", citaFin: "ezer ez dakidala",
            disertacion: "**Epistemologia** gaietan erabili. Jarrera: Humiltasun intelektuala benetako ikaskuntzarako eta egia objektiboa bilatzeko ezinbesteko baldintza gisa." 
        },
        {   id: 2, autor: "Descartes", 
            citaCompleta: "Pentsatzen dut, beraz banaiz.", 
            citaInicio: "Pentsatzen dut, beraz...", citaFin: "banaiz",
            disertacion: "**Racionalismoa edo Identitatea** gaietan erabili. Jarrera: Autokontzientzia da gizakion ezagutzaren oinarri ukaezin bakarra eszeptizismoaren aurrean." 
        },
        {   id: 3, autor: "Nietzsche", 
            citaCompleta: "Jainkoa hil da.", 
            citaInicio: "Jainkoa...", citaFin: "hil da",
            disertacion: "**Existentzialismoa edo Balioak** gaietan erabili. Jarrera: Balio absolutu tradizionalen amaierak gizakia bere zentzua eta moralitatea hartzera behartzen du." 
        },
        {   id: 4, autor: "Aristoteles", 
            citaCompleta: "Gizakia animalia politikoa da.", 
            citaInicio: "Gizakia animalia...", citaFin: "politikoa da",
            disertacion: "**Soziologia edo Etika** gaietan erabili. Jarrera: Gizakia komunitatean (polisean) bakarrik gara daiteke; isolamendua ez da naturala." 
        },
        {   id: 5, autor: "Hobbes", 
            citaCompleta: "Homo homini lupus.", 
            citaInicio: "Homo homini...", citaFin: "lupus",
            disertacion: "**Filosofia Politikoa** gaietan erabili. Jarrera: Kontratu sozialaren defentsa eta botere indartsu baten beharra giza izaera egoistak sor dezakeen kaosa ekiditeko." 
        },
        {   id: 6, autor: "Rousseau", 
            citaCompleta: "Gizakia libre jaiotzen da, baina leku guztietan kateatuta dago.", 
            citaInicio: "Gizakia libre jaiotzen da, baina...", citaFin: "leku guztietan kateatuta dago",
            disertacion: "**Askatasuna edo Hezkuntza** gaietan erabili. Jarrera: Gizarte-egiturek eta jabetza pribatuak jatorrizko askatasun naturala nola usteltzen duten kritikatzeko." 
        },
        {   id: 8, autor: "Marx", 
            citaCompleta: "Erlijioa herriaren opioa da.", 
            citaInicio: "Erlijioa herriaren...", citaFin: "opioa da",
            disertacion: "**Materialismoa edo Kritika Soziala** gaietan erabili. Jarrera: Erlijioak klase zapalduei aldaketa errealen alde borrokatzea eragozten dien ilusiozko arintasun gisa funtzionatzen du." 
        },
        {   id: 9, autor: "Heraclito", 
            citaCompleta: "Inor ez da birritan bainatzen ibai berean.", 
            citaInicio: "Inor ez da birritan bainatzen...", citaFin: "ibai berean",
            disertacion: "**Metafisika** gaietan erabili. Jarrera: Aldaketa da unibertsoaren konstante bakarra; errealitatea jario betea da, ez zerbait estatikoa." 
        },
        {   id: 10, autor: "Beauvoir", 
            citaCompleta: "Emakume ez da jaiotzen, egin egiten da.", 
            citaInicio: "Emakume ez da jaiotzen, egin...", citaFin: "egiten da",
            disertacion: "**Generoa edo Existentzialismoa** gaietan erabili. Jarrera: Generoa kulturalki eta sozialki inposatutako eraikuntza da, ez halabeharrezko destino biologikoa." 
        }
    ];

    let gameMode = "autor"; 
    let currentGameList = [];
    let currentIndex = 0;
    let score = 0;
    let timer;

    function showStart() {
        document.querySelectorAll('#game-container > div').forEach(div => div.classList.add('hidden'));
        document.getElementById('screen-start').classList.remove('hidden');
    }

    function setMode(mode) {
        gameMode = mode;
        startGame();
    }

    function startGame() {
        currentGameList = [...allRefranes].sort(() => 0.5 - Math.random()).slice(0, 5);
        currentIndex = 0;
        score = 0;
        document.getElementById('screen-start').classList.add('hidden');
        document.getElementById('screen-game').classList.remove('hidden');
        showQuestion();
    }

    function showQuestion() {
        const item = currentGameList[currentIndex];
        const display = document.getElementById('display-cita');
        const input = document.getElementById('user-input');
        
        document.getElementById('progress').innerText = `${currentIndex + 1} / ${currentGameList.length} ENIGMA`;
        
        if (gameMode === "autor") {
            display.innerText = `"${item.citaCompleta}"`;
            input.placeholder = "Filosofoaren abizena...";
        } else {
            display.innerHTML = `<span style="color:var(--accent); font-family:'Cinzel'">${item.autor}</span><br>"${item.citaInicio}"`;
            input.placeholder = "Esaldia osatu...";
        }

        input.value = "";
        input.disabled = false;
        document.getElementById('btn-submit').classList.remove('hidden');
        document.getElementById('feedback-area').classList.add('hidden');
        setTimeout(() => input.focus(), 100);
    }

    function normalizeText(str) {
        return str.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().trim().replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g,"");
    }

    function checkAnswer() {
        const userVal = normalizeText(document.getElementById('user-input').value);
        const item = currentGameList[currentIndex];
        const correctVal = normalizeText(gameMode === "autor" ? item.autor : item.citaFin);
        
        const feedbackMsg = document.getElementById('feedback-msg');
        document.getElementById('user-input').disabled = true;
        document.getElementById('btn-submit').classList.add('hidden');
        document.getElementById('feedback-area').classList.remove('hidden');

        if (userVal === correctVal || (userVal.length > 4 && correctVal.includes(userVal))) {
            feedbackMsg.innerText = "🏛️ Zuzen! Jakituria frogatua.";
            feedbackMsg.style.color = "var(--success)";
            saveProgress(item.id);
            score++;
        } else {
            feedbackMsg.innerText = `✘ Okerra. Erantzuna: ${gameMode === "autor" ? item.autor : item.citaFin}`;
            feedbackMsg.style.color = "var(--error)";
        }

        const disertacionFormateada = item.disertacion.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
        document.getElementById('explanation-text').innerHTML = `<strong>Disertazio Gida:</strong><br>${disertacionFormateada}`;
        startTimer();
    }

    function startTimer() {
        let timeLeft = 6;
        const timerMsg = document.getElementById('timer-msg');
        const btnNext = document.getElementById('btn-next');
        btnNext.classList.add('hidden');
        
        if (timer) clearInterval(timer);
        timer = setInterval(() => {
            timerMsg.innerText = `Hurrengo galdera prest ${timeLeft} segundotan...`;
            if (timeLeft <= 0) {
                clearInterval(timer);
                timerMsg.innerText = "";
                btnNext.classList.remove('hidden');
            }
            timeLeft--;
        }, 1000);
    }

    function nextQuestion() {
        currentIndex++;
        currentIndex < currentGameList.length ? showQuestion() : endGame();
    }

    function endGame() {
        document.getElementById('screen-game').classList.add('hidden');
        document.getElementById('screen-end').classList.remove('hidden');
        document.getElementById('final-score').innerText = `Emaitza: ${score} / ${currentGameList.length}`;
    }

    function saveProgress(id) {
        let unlocked = JSON.parse(localStorage.getItem('filo_eu_v1') || "[]");
        if (!unlocked.includes(id)) {
            unlocked.push(id);
            localStorage.setItem('filo_eu_v1', JSON.stringify(unlocked));
        }
    }

    function showGallery() {
        document.querySelectorAll('#game-container > div').forEach(div => div.classList.add('hidden'));
        document.getElementById('screen-gallery').classList.remove('hidden');
        const grid = document.getElementById('gallery-grid');
        const unlocked = JSON.parse(localStorage.getItem('filo_eu_v1') || "[]");
        
        document.getElementById('gallery-count').innerText = `${unlocked.length} / ${allRefranes.length} aipu aurkituta`;
        grid.innerHTML = "";

        allRefranes.forEach(item => {
            const isUnlocked = unlocked.includes(item.id);
            const card = document.createElement('div');
            card.className = `refran-card ${isUnlocked ? 'unlocked' : 'locked'}`;
            card.innerHTML = isUnlocked ? `<span style="font-size:0.8rem; font-style:italic;">"${item.citaCompleta}"</span>` : "🔒";
            if (isUnlocked) card.onclick = () => openModal(item);
            grid.appendChild(card);
        });
    }

    function openModal(item) {
        document.getElementById('modal-title').innerText = item.autor;
        document.getElementById('modal-subtitle').innerText = `"${item.citaCompleta}"`;
        const disertacionFormateada = item.disertacion.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
        document.getElementById('modal-desc').innerHTML = `<strong>Estrategia Akademikoa:</strong><br>${disertacionFormateada}`;
        document.getElementById('modal').classList.remove('hidden');
    }

    function closeModal() { document.getElementById('modal').classList.add('hidden'); }

    showStart();
</script>
</body>
</html>
