<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz de Banderas</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
    :root {
        --bg-color: #121212;
        --card-color: #1e1e1e;
        --text-color: #ffffff;
        --correct-color: #4caf50;
        --wrong-color: #f44336;
        --accent-color: #2196f3;
    }

    body {
        font-family: 'Segoe UI', sans-serif;
        background-color: var(--bg-color);
        color: var(--text-color);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }

    #game-container {
        width: 90%;
        max-width: 400px;
        text-align: center;
    }

    .screen { display: none; }
    .active { display: block; }

    .btn-start {
        background-color: var(--accent-color);
        color: white;
        border: none;
        padding: 15px 40px;
        font-size: 1.2rem;
        border-radius: 10px;
        cursor: pointer;
        margin: 10px 0;
    }
#timer-container {
    font-family: 'Courier New', Courier, monospace;
    font-size: 1.8rem;
    font-weight: bold;
    color: var(--accent-color);
    margin-bottom: 15px;
    text-shadow: 0 0 10px rgba(33, 150, 243, 0.3);
    background: rgba(255, 255, 255, 0.05);
    padding: 10px;
    border-radius: 50px;
    display: inline-block;
    min-width: 120px;
    border: 1px solid #333;
}

.timer-low {
    color: #ff9800 !important; /* Naranja si pasa de 1 min */
}

.timer-critical {
    color: #f44336 !important; /* Rojo si pasa de 2 min */
    animation: pulse 1s infinite;
}

@keyframes pulse {
    0% { opacity: 1; }
    50% { opacity: 0.5; }
    100% { opacity: 1; }
}
    /* CONTENEDOR EQUILIBRADO */
    .flag-container {
        width: 100%;
        height: 220px;
        background-color: #1a1a1a; /* Un tono más oscuro para que resalte la bandera */
        border-radius: 15px;
        display: flex;
        justify-content: center;
        align-items: center;
        margin-bottom: 25px;
        overflow: hidden;
        border: 2px solid #333;
        /* Un pequeño respiro de 5px para que no toque el borde físico */
        padding: 5px; 
        box-sizing: border-box;
    }

    /* LA IMAGEN: GRANDE PERO RESPETUOSA */
    .flag-container img {
        width: 100%;
        height: 100%;
        /* 'contain' hace que la bandera se vea ENTERA y con su calidad original */
        object-fit: contain; 
        display: block;
        /* Esto suaviza los bordes si la imagen es de baja resolución */
        image-rendering: auto; 
    }

    .options-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
    }

    .option-btn {
        background-color: var(--card-color);
        color: white;
        border: 2px solid #333;
        padding: 18px 5px;
        border-radius: 10px;
        font-size: 0.95rem;
        cursor: pointer;
        transition: background 0.2s;
    }

    .correct { background-color: var(--correct-color) !important; border-color: var(--correct-color) !important; }
    .wrong { background-color: var(--wrong-color) !important; border-color: var(--wrong-color) !important; }

    #score-counter {
        margin-top: 25px;
        font-size: 1.1rem;
        font-weight: bold;
        color: #aaa;
    }
   #lista-ranking {
    list-style: none;
    padding: 0;
    max-width: 280px; /* Un poco más ancho para que luzca mejor */
    margin: 20px auto;
    text-align: left;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}
    .btn-start {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px; /* Un poco más de espacio */
    font-size: 1.5rem; /* El nombre del pack grande */
    margin-bottom: 10px;
    width: 100%;
}

.best-player {
    font-size: 0.9rem; /* El récord un poco más pequeño */
    font-weight: normal;
    margin-top: 8px;
    color: #ffcc00; /* Un color dorado para resaltar al campeón */
    text-transform: uppercase;
}

#lista-ranking li {
    background: #252525;
    margin-bottom: 8px;
    padding: 12px;
    border-radius: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border: 1px solid #333;
    transition: transform 0.2s; /* Efecto suave al pasar el ratón */
}

/* Efecto al pasar el ratón por encima */
#lista-ranking li:hover {
    transform: scale(1.02);
    background: #2a2a2a;
}

/* Estilo general para el número del puesto */
#lista-ranking li span {
    font-weight: bold;
    margin-right: 10px;
}

/* 🥇 PRIMER PUESTO (ORO) */
#lista-ranking li:nth-child(1) {
    border: 1px solid #ffd700;
    background: linear-gradient(90deg, #252525, #3a3200);
}
#lista-ranking li:nth-child(1) span {
    color: #ffd700; /* Oro */
    text-shadow: 0 0 5px rgba(255, 215, 0, 0.5);
}

/* 🥈 SEGUNDO PUESTO (PLATA) */
#lista-ranking li:nth-child(2) {
    border: 1px solid #c0c0c0;
}
#lista-ranking li:nth-child(2) span {
    color: #c0c0c0; /* Plata */
}

/* 🥉 TERCER PUESTO (BRONCE) */
#lista-ranking li:nth-child(3) {
    border: 1px solid #cd7f32;
}
#lista-ranking li:nth-child(3) span {
    color: #cd7f32; /* Bronce */
}

/* Resto de puestos (4 al 10) */
#lista-ranking li:nth-child(n+4) span {
    color: #2196f3; /* Tu azul original */
}

/* Estilo para los puntos */
#lista-ranking li b {
    color: #fff;
    font-size: 0.9rem;
}

/* --- RESPONSIVE (Móviles) --- */
@media (max-width: 1100px) {
    #news-sidebar {
        position: relative;
        left: 0;
        top: 0;
        transform: none;
        width: 90%;
        margin: 20px auto;
        max-height: 400px;
    }
}
/* Añade esto a tu bloque <style> */
#lista-ranking li div {
    display: flex;
    align-items: center;
    justify-content: flex-end;
}

#lista-ranking li b {
    min-width: 50px;
    text-align: right;
}

#lista-ranking li small {
    font-family: monospace;
    background: rgba(0,0,0,0.3);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 0.8rem;
}
</style>
</head>
<body>

<div id="game-container">

    <!-- PANTALLA INICIO -->
    <div id="start-screen" class="screen active">
    <h1>Flags Quiz</h1>
    
    <button class="btn-start" onclick="seleccionarPack('pack1')">
        WORLD
        <div id="best-pack1" class="best-player">Cargando récord...</div>
    </button>

    <button class="btn-start" onclick="seleccionarPack('pack2')">
        BIZKAIA
        <div id="best-pack2" class="best-player">Cargando récord...</div>
    </button>

    <button class="btn-start" onclick="seleccionarPack('pack3')">
        ARMARRI
        <div id="best-pack3" class="best-player">Cargando récord...</div>
    </button>

    <button class="btn-start" onclick="seleccionarPack('pack4')">
        PROVINCIAS
        <div id="best-pack4" class="best-player">Cargando récord...</div>
    </button>
        <button class="btn-start" onclick="seleccionarPack('pack5')">
        ESPAÑA 100K
        <div id="best-pack5" class="best-player">Cargando récord...</div>
    </button>
            </button>
        <button class="btn-start" onclick="seleccionarPack('pack6')">
        MUNDO OFICIAL
        <div id="best-pack6" class="best-player">Cargando récord...</div>
    </button>
    <button class="btn-start" onclick="seleccionarPack('pack_espana_top')">
    ESPAÑA PRO
    <div id="best-pack_espana_top" class="best-player">Cargando récord...</div>
</button>
</div>

    <!-- PANTALLA QUIZ -->
    <div id="quiz-screen" class="screen">
        <div id="timer-container">0:00</div> <div class="flag-container">
            <img id="flag-img" src="" alt="Bandera">
        </div>
        <div class="options-grid" id="options-container"></div>
        <div id="score-counter">Aciertos: <span id="hits">0</span> / <span id="current-q">1</span></div>
    </div>

    <!-- PANTALLA FINAL -->
 <div id="end-screen" class="screen">
    <h2>¡Completado!</h2>
    <p id="final-result"></p>
    
    <div id="save-score-zone">
        <input type="text" id="player-name" placeholder="Escribe tu nombre" style="padding: 10px; border-radius: 5px; border: none;">
        <button class="btn-start" onclick="enviarPuntuacion()">ENVIAR PUNTUACIÓN</button>
    </div>
<div id="ranking-container">
    <h3>🏆 TOP 10 MUNDIAL</h3>
    <ul id="lista-ranking">
        </ul>
</div>
    <ul id="lista-ranking"></ul>
    <button class="btn-start" onclick="location.reload()">VOLVER A JUGAR</button>
</div>

</div>
<script>
const supabaseUrl = 'https://obwmxhzbpprllnngsitr.supabase.co';
const supabaseKey = 'sb_publishable_bm9xVJA_DBJ0Ulh25_rQsg_GGc7fXqC';
const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

// --- VARIABLES GLOBALES ---
let packs = {};
let packActual = "";
let indiceActual = 0;
let aciertos = 0;
let preguntasMezcladas = [];
let interactuable = true;
let indiceCorrectoActual = 0;
let tiempoInicio = 0;
let intervaloTimer;

const nombresBonitos = {
    'pack1': 'MUNDIAL', 'pack2': 'BIZKAIA', 'pack3': 'ARMARRI',
    'pack4': 'PROVINCIAS', 'pack5': 'ESPAÑA 100K', 'pack6': 'MUNDO OFICIAL',
    'pack_espana_top': 'ESPAÑA PRO'
};

// --- UTILIDADES ---
// Única función Shuffle para todo el programa (Algoritmo Fisher-Yates)
function shuffle(array) {
    let m = array.length, t, i;
    while (m) {
        i = Math.floor(Math.random() * m--);
        t = array[m];
        array[m] = array[i];
        array[i] = t;
    }
    return array;
}

function formatearTiempo(segundos) {
    if (segundos === undefined || segundos === null) return "0:00";
    const min = Math.floor(segundos / 60);
    const seg = segundos % 60;
    return `${min}:${seg.toString().padStart(2, '0')}`;
}

// --- CARGA DE DATOS ---
async function cargarDatos() {
    try {
        const respuesta = await fetch('datos.json');
        const datosCargados = await respuesta.json();
        
        Object.keys(datosCargados).forEach(key => {
            let p = datosCargados[key];
            if (p && p.length > 0) {
                while (p.length < 25) {
                    p.push({...p[Math.floor(Math.random() * p.length)]});
                }
            }
        });
        packs = datosCargados;
    } catch (e) { console.error("Error cargando JSON:", e); }
}

// --- LÓGICA DE SELECCIÓN ---
async function seleccionarPack(nombreDelPack) {
    const btn = event?.currentTarget; // Captura el botón clicado de forma segura

    if (nombreDelPack === 'pack_espana_top') {
        if (btn) btn.innerText = "🌀 GENERANDO...";
        const nuevoPack = await generarPackEspanaPro();
        if (nuevoPack && nuevoPack.length >= 25) {
            packs['pack_espana_top'] = nuevoPack;
            packActual = 'pack_espana_top';
            startGame('pack_espana_top');
        } else {
            alert("Error de conexión con la base de datos de banderas.");
            if (btn) btn.innerText = "ESPAÑA PRO";
        }
        return;
    }

    if (packs[nombreDelPack]) {
        packActual = nombreDelPack;
        startGame(nombreDelPack);
    }
}

// --- GENERADOR DINÁMICO (WIKIDATA) ---
async function generarPackEspanaPro() {
    // 1. La consulta SPARQL (Filtrada para ser rápida y eficiente)
    const sparql = `
    SELECT DISTINCT ?itemLabel ?flag ?typeLabel WHERE {
      ?item wdt:P17 wd:Q29 ; 
            wdt:P41 ?flag ; 
            wdt:P31 ?type . 
      VALUES (?type ?typeLabel) { 
        (wd:Q202166 "Comunidad") (wd:Q15089 "Provincia") 
        (wd:Q515 "Ciudad") (wd:Q171585 "Histórico")
      }
      SERVICE wikibase:label { bd:serviceParam wikibase:language "es". }
      FILTER(?item != wd:Q29)
      FILTER(!CONTAINS(LCASE(?itemLabel), "españa"))
      OPTIONAL { ?item wdt:P1082 ?pob . }
      FILTER (!bound(?pob) || ?pob > 25000)
    } 
    ORDER BY UUID() 
    LIMIT 100`;

    try {
        // 2. Llamada a la API con una identidad (User-Agent) para que no nos bloqueen
        const url = "https://query.wikidata.org/sparql?query=" + encodeURIComponent(sparql);
        
        const res = await fetch(url, {
            headers: { 'Accept': 'application/sparql-results+json' }
        });

        if (!res.ok) throw new Error("Error en respuesta de Wikidata");

        const data = await res.json();
        let pool = data.results.bindings.map(b => ({
            img: b.flag.value.replace("http://", "https://"), // Forzar HTTPS para evitar bloqueos de imagen
            nombre: b.itemLabel.value,
            tipo: b.typeLabel.value
        }));

        if (pool.length < 25) throw new Error("Datos insuficientes");

        // 3. Mezclamos el total
        shuffle(pool);
        const seleccionadas = pool.slice(0, 25);

        // 4. Creamos las preguntas con distractores inteligentes
        return seleccionadas.map(entidad => {
            // Buscamos 3 nombres de la MISMA categoría (Provincia con Provincia, etc.)
            let distractores = pool
                .filter(f => f.tipo === entidad.tipo && f.nombre !== entidad.nombre)
                .map(d => d.nombre);

            // Si no hay suficientes de su tipo, cogemos de cualquiera del pool
            if (distractores.length < 3) {
                distractores = pool
                    .filter(f => f.nombre !== entidad.nombre)
                    .map(d => d.nombre);
            }

            // Barajamos distractores y cogemos 3
            shuffle(distractores);
            let opcionesFinales = [entidad.nombre, ...distractores.slice(0, 3)];
            
            // Barajamos las 4 opciones finales para que la correcta no sea siempre la primera
            shuffle(opcionesFinales);

            return {
                img: entidad.img,
                opciones: opcionesFinales,
                correcta: opcionesFinales.indexOf(entidad.nombre)
            };
        });
    } catch (e) {
        console.error("Fallo en la traca de España Pro:", e);
        return null; 
    }
}
// --- MOTOR DEL JUEGO ---
function startGame(packElegido) {
    document.getElementById('start-screen').classList.remove('active');
    document.getElementById('quiz-screen').classList.add('active');

    // Mezclamos el pack seleccionado y cogemos 25
    preguntasMezcladas = shuffle([...packs[packElegido]]).slice(0, 25);
    
    indiceActual = 0;
    aciertos = 0;
    tiempoInicio = Date.now();
    
    clearInterval(intervaloTimer);
    intervaloTimer = setInterval(actualizarCronometro, 1000); 
    renderQuestion();
}

function renderQuestion() {
    interactuable = true;
    const data = preguntasMezcladas[indiceActual];
    
    // El pack ya viene con las opciones mezcladas desde el generador o el JSON
    // Pero por seguridad las remezclamos aquí también
    indiceCorrectoActual = data.correcta; 

    document.getElementById('flag-img').src = data.img;
    document.getElementById('current-q').innerText = indiceActual + 1;
    document.getElementById('hits').innerText = aciertos;

    const container = document.getElementById('options-container');
    container.innerHTML = ''; 

    data.opciones.forEach((texto, i) => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.innerText = texto;
        btn.onclick = () => checkAnswer(i, btn);
        container.appendChild(btn);
    });
}

function checkAnswer(elegida, btn) {
    if (!interactuable) return;
    interactuable = false;

    const botones = document.querySelectorAll('.option-btn');
    if (elegida === preguntasMezcladas[indiceActual].correcta) {
        btn.classList.add('correct');
        aciertos++;
    } else {
        btn.classList.add('wrong');
        botones[preguntasMezcladas[indiceActual].correcta].classList.add('correct');
    }

    setTimeout(() => {
        indiceActual++;
        if (indiceActual < 25) renderQuestion();
        else finishGame();
    }, 1500);
}

function actualizarCronometro() {
    const transcurrido = Math.floor((Date.now() - tiempoInicio) / 1000);
    const display = document.getElementById('timer-container');
    display.innerText = formatearTiempo(transcurrido);
}

function finishGame() {
    clearInterval(intervaloTimer);
    const tiempoFinal = Math.floor((Date.now() - tiempoInicio) / 1000);
    window.ultimoTiempo = tiempoFinal;

    document.getElementById('quiz-screen').classList.remove('active');
    document.getElementById('end-screen').classList.add('active');
    document.getElementById('final-result').innerText = `Has conseguido ${aciertos} aciertos en ${formatearTiempo(tiempoFinal)}.`;

    mostrarRankingActualizado(packActual);
}

// --- SUPABASE & RANKING ---
async function enviarPuntuacion() {
    const nombre = document.getElementById('player-name').value;
    if (!nombre) return;
    
    const { error } = await _supabase
        .from('ranking')
        .insert([{ 
            username: nombre, 
            score: aciertos, 
            pack_name: packActual,
            tiempo: window.ultimoTiempo 
        }]);

    if (!error) {
        document.getElementById('save-score-zone').style.display = 'none';
        mostrarRankingActualizado(packActual);
    }
}

async function mostrarRankingActualizado(nombrePack) {
    const { data: ranking, error } = await _supabase
        .from('ranking')
        .select('*')
        .eq('pack_name', nombrePack)
        .order('score', { ascending: false })
        .order('tiempo', { ascending: true })
        .limit(10);

    if (error) return;
    const lista = document.getElementById('lista-ranking');
    lista.innerHTML = ranking.map((user, index) => `
        <li>
            <span>#${index + 1}</span> ${user.username}
            <div><b>${user.score} pts</b> <small>⏱️ ${formatearTiempo(user.tiempo)}</small></div>
        </li>`).join('');
}

async function cargarMejoresPorCategoria() {
    const packsArray = ['pack1', 'pack2', 'pack3', 'pack4', 'pack5', 'pack6', 'pack_espana_top'];
    for (const packKey of packsArray) {
        const { data } = await _supabase
            .from('ranking')
            .select('*')
            .eq('pack_name', packKey)
            .order('score', { ascending: false })
            .order('tiempo', { ascending: true })
            .limit(1).maybeSingle();

        const contenedor = document.getElementById(`best-${packKey}`);
        if (contenedor && data) {
            contenedor.innerHTML = `🏆 ${data.username}: <b>${data.score} pts</b> <small>(${formatearTiempo(data.tiempo)})</small>`;
        }
    }
}

document.addEventListener('DOMContentLoaded', () => {
    cargarDatos();
    cargarMejoresPorCategoria();
});
</script>
</body>
</html>
