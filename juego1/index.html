<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz de Banderas</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
    :root {
        --bg-color: #121212;
        --card-color: #1e1e1e;
        --text-color: #ffffff;
        --correct-color: #4caf50;
        --wrong-color: #f44336;
        --accent-color: #2196f3;
    }

    body {
        font-family: 'Segoe UI', sans-serif;
        background-color: var(--bg-color);
        color: var(--text-color);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }

    #game-container {
        width: 90%;
        max-width: 400px;
        text-align: center;
    }

    .screen { display: none; }
    .active { display: block; }

    .btn-start {
        background-color: var(--accent-color);
        color: white;
        border: none;
        padding: 15px 40px;
        font-size: 1.2rem;
        border-radius: 10px;
        cursor: pointer;
        margin: 10px 0;
    }

    /* CONTENEDOR EQUILIBRADO */
    .flag-container {
        width: 100%;
        height: 220px;
        background-color: #1a1a1a; /* Un tono más oscuro para que resalte la bandera */
        border-radius: 15px;
        display: flex;
        justify-content: center;
        align-items: center;
        margin-bottom: 25px;
        overflow: hidden;
        border: 2px solid #333;
        /* Un pequeño respiro de 5px para que no toque el borde físico */
        padding: 5px; 
        box-sizing: border-box;
    }

    /* LA IMAGEN: GRANDE PERO RESPETUOSA */
    .flag-container img {
        width: 100%;
        height: 100%;
        /* 'contain' hace que la bandera se vea ENTERA y con su calidad original */
        object-fit: contain; 
        display: block;
        /* Esto suaviza los bordes si la imagen es de baja resolución */
        image-rendering: auto; 
    }

    .options-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
    }

    .option-btn {
        background-color: var(--card-color);
        color: white;
        border: 2px solid #333;
        padding: 18px 5px;
        border-radius: 10px;
        font-size: 0.95rem;
        cursor: pointer;
        transition: background 0.2s;
    }

    .correct { background-color: var(--correct-color) !important; border-color: var(--correct-color) !important; }
    .wrong { background-color: var(--wrong-color) !important; border-color: var(--wrong-color) !important; }

    #score-counter {
        margin-top: 25px;
        font-size: 1.1rem;
        font-weight: bold;
        color: #aaa;
    }
   #lista-ranking {
    list-style: none;
    padding: 0;
    max-width: 280px; /* Un poco más ancho para que luzca mejor */
    margin: 20px auto;
    text-align: left;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}
    .btn-start {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px; /* Un poco más de espacio */
    font-size: 1.5rem; /* El nombre del pack grande */
    margin-bottom: 10px;
    width: 100%;
}

.best-player {
    font-size: 0.9rem; /* El récord un poco más pequeño */
    font-weight: normal;
    margin-top: 8px;
    color: #ffcc00; /* Un color dorado para resaltar al campeón */
    text-transform: uppercase;
}

#lista-ranking li {
    background: #252525;
    margin-bottom: 8px;
    padding: 12px;
    border-radius: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border: 1px solid #333;
    transition: transform 0.2s; /* Efecto suave al pasar el ratón */
}

/* Efecto al pasar el ratón por encima */
#lista-ranking li:hover {
    transform: scale(1.02);
    background: #2a2a2a;
}

/* Estilo general para el número del puesto */
#lista-ranking li span {
    font-weight: bold;
    margin-right: 10px;
}

/* 🥇 PRIMER PUESTO (ORO) */
#lista-ranking li:nth-child(1) {
    border: 1px solid #ffd700;
    background: linear-gradient(90deg, #252525, #3a3200);
}
#lista-ranking li:nth-child(1) span {
    color: #ffd700; /* Oro */
    text-shadow: 0 0 5px rgba(255, 215, 0, 0.5);
}

/* 🥈 SEGUNDO PUESTO (PLATA) */
#lista-ranking li:nth-child(2) {
    border: 1px solid #c0c0c0;
}
#lista-ranking li:nth-child(2) span {
    color: #c0c0c0; /* Plata */
}

/* 🥉 TERCER PUESTO (BRONCE) */
#lista-ranking li:nth-child(3) {
    border: 1px solid #cd7f32;
}
#lista-ranking li:nth-child(3) span {
    color: #cd7f32; /* Bronce */
}

/* Resto de puestos (4 al 10) */
#lista-ranking li:nth-child(n+4) span {
    color: #2196f3; /* Tu azul original */
}

/* Estilo para los puntos */
#lista-ranking li b {
    color: #fff;
    font-size: 0.9rem;
}

/* --- RESPONSIVE (Móviles) --- */
@media (max-width: 1100px) {
    #news-sidebar {
        position: relative;
        left: 0;
        top: 0;
        transform: none;
        width: 90%;
        margin: 20px auto;
        max-height: 400px;
    }
}
</style>
</head>
<body>

<div id="game-container">

    <!-- PANTALLA INICIO -->
    <div id="start-screen" class="screen active">
    <h1>Flags Quiz</h1>
    
    <button class="btn-start" onclick="seleccionarPack('pack1')">
        WORLD
        <div id="best-pack1" class="best-player">Cargando récord...</div>
    </button>

    <button class="btn-start" onclick="seleccionarPack('pack2')">
        BIZKAIA
        <div id="best-pack2" class="best-player">Cargando récord...</div>
    </button>

    <button class="btn-start" onclick="seleccionarPack('pack3')">
        ARMARRI
        <div id="best-pack3" class="best-player">Cargando récord...</div>
    </button>

    <button class="btn-start" onclick="seleccionarPack('pack4')">
        PROVINCIAS
        <div id="best-pack4" class="best-player">Cargando récord...</div>
    </button>
        <button class="btn-start" onclick="seleccionarPack('pack5')">
        ESPAÑA 100K
        <div id="best-pack5" class="best-player">Cargando récord...</div>
    </button>
            </button>
        <button class="btn-start" onclick="seleccionarPack('pack6')">
        MUNDO OFICIAL
        <div id="best-pack6" class="best-player">Cargando récord...</div>
    </button>
</div>

    <!-- PANTALLA QUIZ -->
    <div id="quiz-screen" class="screen">
        <div class="flag-container">
            <img id="flag-img" src="" alt="Bandera">
        </div>
        <div class="options-grid" id="options-container"></div>
        <div id="score-counter">Aciertos: <span id="hits">0</span> / <span id="current-q">1</span></div>
    </div>

    <!-- PANTALLA FINAL -->
 <div id="end-screen" class="screen">
    <h2>¡Completado!</h2>
    <p id="final-result"></p>
    
    <div id="save-score-zone">
        <input type="text" id="player-name" placeholder="Escribe tu nombre" style="padding: 10px; border-radius: 5px; border: none;">
        <button class="btn-start" onclick="enviarPuntuacion()">ENVIAR PUNTUACIÓN</button>
    </div>
<div id="ranking-container">
    <h3>🏆 TOP 10 MUNDIAL</h3>
    <ul id="lista-ranking">
        </ul>
</div>
    <ul id="lista-ranking"></ul>
    <button class="btn-start" onclick="location.reload()">VOLVER A JUGAR</button>
</div>

</div>
<script>
const supabaseUrl = 'https://obwmxhzbpprllnngsitr.supabase.co';
const supabaseKey = 'sb_publishable_bm9xVJA_DBJ0Ulh25_rQsg_GGc7fXqC';
const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

// --- VARIABLES GLOBALES (Declaradas al principio) ---
let packs = {};
let packActual = "";
let indiceActual = 0;
let aciertos = 0;
let preguntasMezcladas = [];
let interactuable = true;
let indiceCorrectoActual = 0;
let tiempoInicio = 0;

// --- DICCIONARIO ---
const nombresBonitos = {
    'pack1': 'MUNDIAL',
    'pack2': 'BIZKAIA',
    'pack3': 'ARMARRI',
    'pack4': 'PROVINCIAS',
    'pack5': 'ESPAÑA 100K',
    'pack6': 'MUNDO OFICIAL'
};

// --- FUNCIONES DE CARGA ---
async function cargarDatos() {
    try {
        const respuesta = await fetch('datos.json');
        const datosCargados = await respuesta.json();
        
        // Rellenar packs pequeños (mínimo 25 preguntas)
        Object.values(datosCargados).forEach(pack => {
            if (pack && pack.length > 0) {
                while (pack.length < 25) {
                    // Clonamos una pregunta aleatoria del mismo pack para evitar referencias circulares
                    const preguntaAzar = pack[Math.floor(Math.random() * pack.length)];
                    pack.push({...preguntaAzar});
                }
            }
        });

        packs = datosCargados; // Guardamos en la variable global una vez procesado
        console.log("Datos cargados y procesados");
    } catch (error) {
        console.error("Error cargando el JSON:", error);
    }
}

async function seleccionarPack(nombreDelPack) {
    // Si los datos aún no están listos, esperamos a que carguen
    if (Object.keys(packs).length === 0) {
        await cargarDatos();
    }
    
    if (packs[nombreDelPack]) {
        packActual = nombreDelPack;
        startGame(nombreDelPack);
    } else {
        console.error("El pack seleccionado no existe o no ha cargado.");
    }
}

// --- LÓGICA DEL JUEGO ---
function startGame(packElegido) {
    document.getElementById('start-screen').classList.remove('active');
    document.getElementById('quiz-screen').classList.add('active');

    // 1. Preparamos las preguntas (Sustituye a tu línea de .sort)
    let todasLasPreguntas = [...packs[packElegido]]; 
    shuffle(todasLasPreguntas); // Mezcla profesional de todas
    preguntasMezcladas = todasLasPreguntas.slice(0, 25); // Agarramos 25
    
    // 2. Reiniciamos contadores
    indiceActual = 0;
    aciertos = 0;
    
    // 3. ¡Iniciamos el cronómetro!
    tiempoInicio = Date.now(); 

    renderQuestion();
}
function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

function renderQuestion() {
    interactuable = true;
    const data = preguntasMezcladas[indiceActual];
    
    // Creamos los objetos de las opciones
    let opcionesConEstado = data.opciones.map((opt, i) => ({ 
        texto: opt, 
        esCorrecta: i === data.correcta 
    }));

    // MEZCLA PROFESIONAL: Usamos Fisher-Yates en lugar de .sort()
    shuffle(opcionesConEstado); 
    
    // Guardamos dónde quedó la correcta después de mezclar
    indiceCorrectoActual = opcionesConEstado.findIndex(obj => obj.esCorrecta);

    // ... (resto del código igual: poner imagen, limpiar contenedor, crear botones)
    document.getElementById('flag-img').src = data.img;
    // etc...
}
function formatearTiempo(segundos) {
    if (!segundos && segundos !== 0) return "--:--"; // Por si el dato es NULL
    const min = Math.floor(segundos / 60);
    const seg = segundos % 60;
    return `${min}:${seg.toString().padStart(2, '0')}`;
}
function checkAnswer(elegida, btn) {
    if (!interactuable) return;
    interactuable = false;

    const botones = document.querySelectorAll('.option-btn');

    if (elegida === indiceCorrectoActual) {
        btn.classList.add('correct');
        aciertos++;
        document.getElementById('hits').innerText = aciertos;
    } else {
        btn.classList.add('wrong');
        botones[indiceCorrectoActual].classList.add('correct');
    }

    setTimeout(() => {
        indiceActual++;
        if (indiceActual < 25) {
            renderQuestion();
        } else {
            finishGame();
        }
    }, 2000);
}

function finishGame() {
    // Calculamos segundos totales
    const tiempoFinal = Math.floor((Date.now() - tiempoInicio) / 1000);
    
    document.getElementById('quiz-screen').classList.remove('active');
    document.getElementById('end-screen').classList.add('active');
    
    // Mostramos el resultado incluyendo el tiempo
    document.getElementById('final-result').innerText = 
        `Has conseguido ${aciertos} aciertos en ${tiempoFinal} segundos.`;
    
    // Guardamos el tiempo en una variable global temporal para enviarla luego
    window.ultimoTiempo = tiempoFinal; 

    mostrarRankingActualizado(packActual);
}

// --- RANKING Y SUPABASE ---
async function guardarEnRankingOnline(nombre, puntos, nombrePack) {
    const tiempo = window.ultimoTiempo; // Recuperamos el tiempo del juego
    
    const { data, error } = await _supabase
        .from('ranking')
        .insert([{ 
            username: nombre, 
            score: puntos, 
            pack_name: nombrePack,
            tiempo: tiempo // <--- ASEGÚRATE DE CREAR ESTA COLUMNA EN SUPABASE
        }]);

    if (error) console.error("Error al guardar:", error);
    else mostrarRankingActualizado(nombrePack);
}
async function mostrarRankingActualizado(nombrePack) {
    if (!nombrePack) return;
    const { data: ranking, error } = await _supabase
        .from('ranking')
        .select('username, score, tiempo') // <--- Asegúrate de pedir la columna tiempo
        .eq('pack_name', nombrePack) 
        .order('score', { ascending: false })
        .order('tiempo', { ascending: true }) // <--- Orden secundario por rapidez
        .limit(10);

    if (error) return;

    const lista = document.getElementById('lista-ranking');
    const titulo = document.querySelector('#ranking-container h3');
    const nombreVisual = nombresBonitos[nombrePack] || nombrePack.toUpperCase();
    
    if (titulo) titulo.innerText = `🏆 TOP 10 ${nombreVisual}`;

    lista.innerHTML = ranking.map((user, index) => {
        const tiempoLegible = formatearTiempo(user.tiempo);
        return `
            <li>
                <span>#${index + 1}</span> 
                ${user.username} 
                <div>
                    <b>${user.score} pts</b> 
                    <small style="color: #888; margin-left: 8px;">⏱️ ${tiempoLegible}</small>
                </div>
            </li>`;
    }).join('');
}
async function cargarMejoresPorCategoria() {
    const packsArray = ['pack1', 'pack2', 'pack3', 'pack4', 'pack5','pack6'];
    for (const pack of packsArray) {
        const { data, error } = await _supabase
            .from('ranking')
            .select('username, score')
            .eq('pack_name', pack)
            .order('score', { ascending: false })
            .limit(1)
            .maybeSingle();

        const contenedor = document.getElementById(`best-${pack}`);
        if (contenedor) {
            if (data) contenedor.innerHTML = `🏆 ${data.username}: <b>${data.score} pts</b>`;
            else contenedor.innerText = "Sin récords aún";
        }
    }
}

function enviarPuntuacion() {
    const nombre = document.getElementById('player-name').value;
    if (nombre) {
        guardarEnRankingOnline(nombre, aciertos, packActual); 
        document.getElementById('save-score-zone').style.display = 'none';
    }
}

// --- CARGA INICIAL ---
document.addEventListener('DOMContentLoaded', () => {
    cargarDatos(); 
    cargarMejoresPorCategoria();
});
</script>
