<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football Quiz Professional</title>
    <style>
/* ==========================================================================
   ESTILOS BASE E INTERFAZ QUIZ (NARANJA/NEGRO)
   ========================================================================== */
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Barlow+Condensed:wght@600;800&display=swap');

:root {
    --psp-orange: #ff9d00;
    --interface-bg: rgba(20, 25, 30, 0.85);
    --text-main: #ffffff;
    --timer-color: #f6ad55;
}

body {
    background: #cbd5e0 url('https://www.transparenttextures.com/patterns/black-linen.png');
    margin: 0;
    height: 100vh;
    font-family: 'Barlow Condensed', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}

#match-clock {
    position: absolute;
    top: 30px;
    left: 30px;
    background: #000;
    color: #d4ff00;
    padding: 10px 20px;
    font-family: 'Orbitron', sans-serif;
    font-size: 1.8rem;
    border: 2px solid #444;
    box-shadow: 4px 4px 10px rgba(0,0,0,0.3);
}

#game-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 25px;
    width: 100%;
    max-width: 800px;
    transform: translateY(-50px);
}

.options-row {
    display: flex;
    justify-content: center;
    gap: 30px;
    width: 100%;
}

.opt-btn {
    background: linear-gradient(90deg, #1a1e22 0%, #323940 100%);
    border: 1px solid #555;
    color: var(--text-main);
    padding: 20px 0;
    font-size: 1.5rem;
    text-transform: none;
    cursor: pointer;
    transform: skew(-25deg);
    width: 350px;
    transition: all 0.2s;
    box-shadow: 8px 8px 15px rgba(0,0,0,0.2);
}

.opt-btn span {
    transform: skew(25deg);
    display: block;
    text-align: center;
    letter-spacing: 1px;
}

.opt-btn:hover:not(:disabled) {
    background: #444;
    border-color: var(--psp-orange);
}

.correct { background: #2ecc71 !important; border-color: #fff !important; }
.incorrect { background: #e74c3c !important; border-color: #fff !important; }
.hidden-opt { opacity: 0; pointer-events: none; transform: scale(0.8) skew(-25deg); }

.bottom-nav {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 130px;
    background: var(--interface-bg);
    border-top: 4px solid #4a5568;
    display: flex;
    align-items: center;
    padding: 0 60px;
    box-sizing: border-box;
    color: white;
}

#q-text {
    font-size: 1.9rem;
    font-weight: 800;
    flex: 1;
    margin-right: 40px;
}

.score-box {
    background: #000;
    border: 3px solid var(--psp-orange);
    padding: 8px 45px;
    transform: skew(-15deg);
}

.score-box div { transform: skew(15deg); text-align: center; }
.score-val { font-size: 2.8rem; font-weight: 900; line-height: 1; }

#timer-container {
    position: absolute;
    left: 50px;
    bottom: 150px;
    width: 14px;
    height: 140px;
    background: #1a202c;
    border: 2px solid #4a5568;
    border-radius: 20px;
    padding: 3px;
}

#timer-fill {
    width: 100%;
    height: 100%;
    background: var(--timer-color);
    border-radius: 20px;
    transition: height 0.1s linear, background 0.3s;
}

/* ==========================================================================
   ESTILOS DEL ESTADIO (MINIMAPA)
   ========================================================================== */
#stadium-map {
    position: absolute;
    top: 30px;
    right: 30px;
    width: 250px;
    height: 400px;
    background: #2d5a27;
    border: 2px solid rgba(255,255,255,0.7);
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    z-index: 10;
}

.pitch-overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    background-image: linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px);
    background-size: 100% 30px;
    pointer-events: none;
}

.pitch-lines {
    position: relative;
    width: 100%;
    height: 100%;
}

/* Línea de puntería (Aim Line) */
#aim-line {
    position: absolute;
    width: 100%;
    height: 4px;
    background: rgba(255, 255, 255, 0.9);
    box-shadow: 0 0 15px white;
    z-index: 5;
    top: 50%;
    transition: top 0.1s linear;
}

.penalty-area {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    width: 120px;
    height: 50px;
    border: 2px solid rgba(255,255,255,0.6);
}

.penalty-top { top: -2px; border-top: none; }
.penalty-bottom { bottom: -2px; border-bottom: none; }

.center-circle {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 70px;
    height: 70px;
    border: 2px solid rgba(255,255,255,0.6);
    border-radius: 50%;
}

.center-line {
    position: absolute;
    top: 50%;
    width: 100%;
    height: 2px;
    background: rgba(255,255,255,0.6);
}

.ball-icon {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    width: 38px;
    height: 38px;
    background: url('https://cdn-icons-png.flaticon.com/512/33/33736.png') no-repeat center;
    background-size: contain;
    filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.6));
    z-index: 10;
    transition: top 0.4s cubic-bezier(0.17, 0.67, 0.83, 0.67), left 0.4s ease-in-out;
}
        

/* ==========================================================================
   OVERLAYS Y PANTALLAS FINALES
   ========================================================================== */
.overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.95);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 100;
    color: white;
    text-align: center;
    font-family: 'Barlow Condensed', sans-serif;
}

.final-score {
    font-size: 8rem;
    font-weight: 900;
    color: var(--psp-orange);
    text-shadow: 0 0 30px rgba(255, 157, 0, 0.4);
    margin: 10px 0;
}

.stat-row {
    font-size: 1.6rem;
    border-bottom: 1px solid #333;
    padding: 12px;
    width: 350px;
    display: flex;
    justify-content: space-between;
    text-transform: none;
    color: #e2e8f0;
}

.difficulty-meter {
    background: #2d3748;
    color: #ecc94b;
    padding: 2px 10px;
    border-radius: 4px;
    font-family: 'Orbitron', sans-serif;
    font-size: 0.9rem;
    letter-spacing: 2px;
    margin-bottom: 8px;
    display: inline-block;
    border: 1px solid #4a5568;
}
#penalty-options #game-area {
    transform: none; /* Quitamos el desplazamiento de la pantalla normal */
    position: static;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
}

#penalty-scene {
    padding-bottom: 100px; /* Espacio para que no tape la barra de abajo */
}

.goal-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
}

#penalty-title {
    color: var(--psp-orange);
    font-size: 3.5rem;
    font-family: 'Orbitron', sans-serif;
    margin-bottom: 20px;
    text-shadow: 0 0 20px rgba(255, 157, 0, 0.5);
}

.goal-frame {
    width: 700px;
    height: 300px;
    border: 12px solid #fff;
    border-bottom: none;
    position: relative;
    box-shadow: 0 0 50px rgba(255,255,255,0.2);
    margin-bottom: 40px;
    background: rgba(45, 90, 39, 0.3); /* Color césped al fondo */
}

.goal-net {
    position: absolute;
    width: 100%;
    height: 100%;
    background-image: 
        linear-gradient(white 2px, transparent 2px),
        linear-gradient(90deg, white 2px, transparent 2px);
    background-size: 30px 30px;
    opacity: 0.15;
}
.difficulty-header {
            display: flex;
            align-items: center;
            justify-content: flex-start; /* Todo a la izquierda */
            gap: 15px;
            margin-bottom: 12px;
            width: 100%;
        }

        .difficulty-meter {
            background: #1a202c;
            padding: 4px 12px;
            border-radius: 4px;
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            letter-spacing: 2px;
            border: 1px solid #4a5568;
            display: inline-block;
        }

        .status-badge {
            background: var(--psp-orange);
            color: black;
            padding: 4px 12px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            font-weight: bold;
            border-radius: 4px;
            text-transform: uppercase;
            box-shadow: 0 0 10px rgba(255, 157, 0, 0.4);
        }

        /* Estilo para el prefijo P: */
        .q-prefix {
            color: var(--psp-orange);
            margin-right: 10px;
        }
        /* El fondo de portería cuando estamos en modo crítico */
body.modo-penalty {
    background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                url('https://images.unsplash.com/photo-1574629810360-7efbbe195018?auto=format&fit=crop&q=80') center/cover !important;
}

/* Escondemos el mapa para que no estorbe en el penalty */
body.modo-penalty #stadium-map { 
    display: none; 
}

    </style>
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<div id="stadium-map">
    <div class="pitch-overlay"></div>
    <div class="pitch-lines">
        <div id="aim-line"></div> 
        
        <div class="penalty-area penalty-top"></div>
        <div class="center-line"></div>
        <div class="center-circle"></div>
        <div class="penalty-area penalty-bottom"></div>
        
        <div id="ball" class="ball-icon"></div>
    </div>
</div>
<div id="match-clock">00:00</div>
<div id="timer-container">
    <div id="timer-fill"></div>
</div>

<div id="game-area">
    <div id="row-top" class="options-row"></div>
    <div id="row-bottom" class="options-row"></div>
</div>

<div class="bottom-nav">
    <div id="q-text">Cargando jugada...</div>
    <div class="score-box">
        <div>
            <span style="font-size: 0.9rem; color: #a0aec0; display: block;">Marcador</span>
            <span id="score" class="score-val">0-0</span>
        </div>
    </div>
</div>
<div id="start-screen" class="overlay">
    <h1 style="color:var(--psp-orange); font-size: 3.5rem; margin-bottom: 10px;">MATCH READY</h1>
    
    <div id="global-iq-display" style="font-family:'Orbitron'; font-size: 1.5rem; color: #fff; margin-bottom: 20px; border-bottom: 2px solid var(--psp-orange); padding-bottom: 10px;">
        PERFIL DE SCOUTING: <span id="iq-valor-inicio" style="color:var(--psp-orange)">No definido</span>
    </div>

    <div style="display: flex; gap: 15px; margin-bottom: 30px;">
        <button class="opt-btn" style="width: 160px; padding: 10px; font-size: 0.9rem;" onclick="toggleGrafico()">
            <span>EVOLUCIÓN IQ</span>
        </button>
        <button class="opt-btn" style="width: 160px; padding: 10px; font-size: 0.9rem; border-color: #e74c3c;" onclick="borrarHistorial()">
            <span>RESET CARRERA</span>
        </button>
    </div>
    
    <button class="opt-btn" style="width: 350px;" onclick="startGame()"><span>KICK OFF</span></button>
</div>

<div id="chart-container" style="display:none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80%; max-width: 700px; background: rgba(10, 10, 10, 0.98); border: 2px solid var(--psp-orange); padding: 30px; z-index: 1000; box-shadow: 0 0 50px rgba(0,0,0,1);">
    <h3 style="color: white; font-family: 'Orbitron'; text-align: center; margin-bottom: 20px;">ANÁLISIS DE RENDIMIENTO HISTÓRICO</h3>
    <canvas id="iqChart"></canvas>
    <button class="opt-btn" style="width: 100%; margin-top: 25px;" onclick="toggleGrafico()"><span>VOLVER AL MENÚ</span></button>
</div>

<div id="goal-overlay" class="overlay" style="display: none;">
    <h2 id="overlay-title" style="color: var(--psp-orange); font-size: 2.5rem;">¡OPORTUNIDAD!</h2>
    <div style="margin: 20px 0; border: 4px solid white; width: 200px; height: 100px; border-bottom: none;"></div>
    <div class="options-row">
        <button class="opt-btn" style="width: 200px;" onclick="definirJugada(true)"><span>GOL</span></button>
        <button class="opt-btn" style="width: 200px;" onclick="definirJugada(false)"><span>FALLAR</span></button>
    </div>
</div>

<script>
    const ball = document.getElementById('ball');
const aimLine = document.getElementById('aim-line');
let goals = 0;
let rivalGoals = 0;
let totalGameSecs = 0;
let internalPoints = 0;
let questionSecsLeft = 15;
let matchTimer, qTimer;
let isFrozen = false;
let optionRemoved = false;
let availableQuestions = [];
let totalAciertos = 0;
let fallosTiempo = 0;
let totalQuestions = 0;
let puntosPrestigioActual = 0;
let puntosPrestigioMaximosPosibles = 0;

// Cargar historial y calcular media antes de empezar
let historialIQ = JSON.parse(localStorage.getItem('historialIQ')) || [];
let mediaIQGlobal = calcularMediaGlobal();
    
// 2. CACHE CORREGIDO (Cambiamos 'ball' por 'ballElem')
const ballElement = document.getElementById('ball');
const aimLineElement = document.getElementById('aim-line')

async function cargarPreguntasDeArchivo() {
    try {
        const respuesta = await fetch('preguntas.json'); // Ruta a tu archivo
        if (!respuesta.ok) throw new Error("No se pudo encontrar el archivo de preguntas");
        
        questions = await respuesta.json();
        console.log("Base de datos de Scouting cargada con éxito.");
    } catch (error) {
        console.error("Error al cargar el pool de preguntas:", error);
        document.getElementById('q-text').innerText = "ERROR: No se pudo cargar el archivo JSON.";
    }
}
    
function calcularMediaGlobal() {
    // IMPORTANTE: Volver a leer el historial del storage por si acaso
    const historialActualizado = JSON.parse(localStorage.getItem('historialIQ')) || [];
    
    if (historialActualizado.length === 0) return "No definido"; // O 0, como prefieras
    
    const suma = historialActualizado.reduce((a, b) => a + b, 0);
    return Math.round(suma / historialActualizado.length);
}

;
function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

async function startGame() {
    // Si por algún motivo el array sigue vacío, intentamos cargar
    if (questions.length === 0) {
        const btn = document.querySelector("#start-screen .opt-btn");
        const textoOriginal = btn.innerHTML;
        btn.innerHTML = "<span>CARGANDO DATOS...</span>";
        
        await cargarPreguntasDeArchivo();
        
        btn.innerHTML = textoOriginal;
    }

    // Verificación de seguridad
    if (questions.length === 0) {
        alert("Error crítico: No hay preguntas disponibles.");
        return;
    }

    document.getElementById('start-screen').style.display = 'none';
    availableQuestions = shuffleArray([...questions]);
    nextQuestion();
    
    matchTimer = setInterval(() => {
        if (!isFrozen) {
            totalGameSecs += 5; 
            updateClock();
            if (totalGameSecs >= 5400) endGame(); 
        }
    }, 100);
}
    
function updateClock() {
    let m = Math.floor(totalGameSecs / 60).toString().padStart(2, '0');
    let s = (totalGameSecs % 60).toString().padStart(2, '0');
    const clockDisplay = document.getElementById('match-clock');
    if (clockDisplay) clockDisplay.innerText = `${m}:${s}`;
}

function nextQuestion() {
    isFrozen = false;
    optionRemoved = false;
    questionSecsLeft = 15;

    if (availableQuestions.length === 0) {
        availableQuestions = shuffleArray([...questions]);
    }
    
    const data = availableQuestions.pop(); 
    totalQuestions++;
    
// El máximo posible aumenta según la dificultad de la pregunta que te ha tocado
    puntosPrestigioMaximosPosibles += (data.level * 10);
    
    let starColor = data.level >= 4 ? "#ff4d4d" : (data.level >= 3 ? "#ffa500" : "#d4ff00");
    const stars = "★".repeat(data.level) + "☆".repeat(5 - data.level);
    
    let avisoHtml = "";
    if (document.body.classList.contains('modo-penalty')) {
        let textoAviso = internalPoints >= 10 ? 'OCASIÓN DE GOL' : 'PELIGRO RIVAL';
        avisoHtml = `<span class="status-badge">${textoAviso}</span>`;
    }

    document.getElementById('q-text').innerHTML = `
        <div class="difficulty-header">
            <div class="difficulty-meter" style="color:${starColor}; border-color:${starColor}">${stars}</div>
            ${avisoHtml}
        </div>
        <span class="q-prefix">P:</span>${data.q}`;

    const rowTop = document.getElementById('row-top');
    const rowBottom = document.getElementById('row-bottom');
    rowTop.innerHTML = ''; 
    rowBottom.innerHTML = '';

    const shuffledOptions = shuffleArray([...data.options]);
    
    shuffledOptions.forEach((opt, i) => {
        const btn = document.createElement('button');
        btn.className = 'opt-btn';
        btn.dataset.answer = opt;
        btn.innerHTML = `<span>${opt}</span>`;
        btn.onclick = () => checkAnswer(opt, data.correct, btn, data.level);
        if (i < 2) rowTop.appendChild(btn); else rowBottom.appendChild(btn);
    });

    // Posición inicial de la barra y el balón
    const inicialPos = (internalPoints + 10) * 5;
    updateVisualMap(inicialPos, inicialPos + (data.level * 6));
    startQTimer(data.correct, data.level);
}

function startQTimer(correct, level) {
    clearInterval(qTimer);
    // Quitamos la suma de fallosTiempo aquí si no la usas para nada más
    qTimer = setInterval(() => {
        if (!isFrozen) {
            questionSecsLeft -= 0.1;
            const fill = document.getElementById('timer-fill');
            if (fill) fill.style.height = (questionSecsLeft / 15 * 100) + "%";

            let ballVisualPos = (internalPoints + 10) * 5;
            let currentLinePos = ballVisualPos + (questionSecsLeft / 15 * (level * 6));
            
            // ELIMINADO: puntosPrestigioActual += (currentLevel * 2); <--- ESTO ERA EL ERROR

            updateVisualMap(ballVisualPos, currentLinePos);

            if (questionSecsLeft <= 2) removeIncorrectOption(correct);

            if (questionSecsLeft <= 0) {
                clearInterval(qTimer);
                document.body.classList.remove('modo-penalty');
                internalPoints -= 2; 
                if (internalPoints <= -10) { rivalGoals++; internalPoints = 0; }
                actualizarMarcadorVisual();
                handleResult("timeout", correct, null);
            }
        }
    }, 100);
}

function checkAnswer(selected, correct, btn, level) {
    if (isFrozen) return;
    const isCorrect = (selected === correct);

    // Contar siempre el acierto
    if (isCorrect) totalAciertos++;

    if (document.body.classList.contains('modo-penalty')) {
        document.body.classList.remove('modo-penalty');
        if (internalPoints >= 10) { 
            if (isCorrect) { 
                goals++; 
                internalPoints = 0;
                puntosPrestigioActual += (level * 12); // Recompensa por gol
            } else { 
                internalPoints -= (6 - level); 
            }
        } else { 
            if (isCorrect) { 
                internalPoints += level;
                puntosPrestigioActual += (level * 5); 
            } else { 
                rivalGoals++; 
                internalPoints = 0; 
            }
        }
    } else {
        if (isCorrect) {
            // TIEMPO AL 10%: El divisor 10 hace que el tiempo influya muy poco
            let bonoRapidez = Math.round(level * (questionSecsLeft / 10)); 
            puntosPrestigioActual += (level * 10) + bonoRapidez;
            
            internalPoints += Math.max(0.1, level * (questionSecsLeft / 15));
        } else {
            internalPoints -= (6 - level);
            // Al fallar no sumas prestigio, pero el 'puntosPrestigioMaximosPosibles' 
            // ya subió en nextQuestion, creando el reto.
        }
    }

    actualizarMarcadorVisual();
    const nuevaPos = (internalPoints + 10) * 5;
    updateVisualMap(nuevaPos, nuevaPos); 

    if (internalPoints >= 10 || internalPoints <= -10) {
        document.body.classList.add('modo-penalty');
    }

    handleResult(isCorrect ? "win" : "fail", correct, btn);
}

    
function handleResult(status, correct, clickedBtn) {
    isFrozen = true;
    clearInterval(qTimer);
    const btns = document.querySelectorAll('.opt-btn');
    btns.forEach(b => {
        b.disabled = true;
        if (b.dataset.answer === correct) b.classList.add('correct');
    });
    if (status === "fail" && clickedBtn) clickedBtn.classList.add('incorrect');
    
    setTimeout(() => {
        if (totalGameSecs < 5400) nextQuestion();
        else endGame();
    }, 1500);
}

function updateVisualMap(bPos, lPos) {
    // IMPORTANTE: Aquí usamos los nombres que definimos arriba
    if (!ballElement || !aimLineElement) return; 
    
    let bPercent = Math.max(0, Math.min(100, bPos));
    let lPercent = Math.max(0, Math.min(100, lPos));
    
    ballElement.style.top = (100 - bPercent) + "%";
    aimLineElement.style.top = (100 - lPercent) + "%";
    
    // Movimiento lateral suave basado en los puntos
    ballElement.style.left = (50 + (internalPoints * 2)) + "%"; 
}

function actualizarMarcadorVisual() {
    const scoreElem = document.getElementById('score');
    if (scoreElem) scoreElem.innerText = `${goals}-${rivalGoals}`;
}

function removeIncorrectOption(correct) {
    if (optionRemoved) return;
    const btns = Array.from(document.querySelectorAll('.opt-btn:not(.hidden-opt)'));
    const incorrectBtns = btns.filter(b => b.dataset.answer !== correct);
    if (incorrectBtns.length > 0) {
        optionRemoved = true;
        incorrectBtns[Math.floor(Math.random() * incorrectBtns.length)].classList.add('hidden-opt');
    }
}

function procesarFinDelPartido() {
    if (puntosPrestigioMaximosPosibles === 0) return;

    // 1. Cálculo de eficiencia (puede superar el 1.0 por los bonos de tiempo)
    let eficiencia = puntosPrestigioActual / puntosPrestigioMaximosPosibles;
    
    // 2. Base IQ a 230 (como sugeriste)
    // Si eres perfecto y rápido, aquí ya estarás cerca de los 250.
    let baseIQ = eficiencia * 220;

    // 3. Factor de Volumen Suavizado (Mínimo 80% de la nota garantizado)
    // Esto evita que en partidos de 6-7 preguntas el IQ se hunda.
    let factorVolumen = 0.9 + (Math.min(totalQuestions, 15) / 15 * 0.2);
    
    // 4. Resultado Final Progresivo
    let iqPartida = Math.round(baseIQ * factorVolumen);

    // 5. Bono de Dificultad (Solo si el partido ha sido "de perros", nivel 4-5)
    let dificultadMedia = puntosPrestigioMaximosPosibles / (totalQuestions * 10); 
    if (dificultadMedia > 0.7) iqPartida += 10; 

    // 6. EL MURO DE CRISTAL
    // Internamente permitimos que llegue a 260 para dar ese "aire" que pedías,
    // pero el usuario solo verá 250 como máximo.
    iqPartida = Math.min(250, iqPartida);

    // Guardar y actualizar
    historialIQ.push(iqPartida);
    localStorage.setItem('historialIQ', JSON.stringify(historialIQ));
    mediaIQGlobal = calcularMediaGlobal();
}
function endGame() {
    isFrozen = true;
    clearInterval(matchTimer);
    clearInterval(qTimer);

    // --- CORRECCIÓN PARA EL IQ JUSTO ---
    // Si el juego termina y había una pregunta en curso que no se respondió:
    const botones = document.querySelectorAll('.opt-btn:not([disabled])');
    if (botones.length > 0 && !isFrozen) {
        // Obtenemos el nivel de la pregunta actual (puedes guardarlo en una variable global si quieres)
        // O más fácil: restamos lo que sumamos al principio de nextQuestion
        let nivelActual = parseInt(document.querySelector('.difficulty-meter').innerText.length);
        puntosPrestigioMaximosPosibles -= (nivelActual * 10);
        totalQuestions--; 
    }
    // Ejecutamos el cálculo interno
    procesarFinDelPartido();

    document.body.innerHTML = `
        <div class='overlay'>
            <h1 style="color:white; font-size:2rem; margin:0;">PARTIDO FINALIZADO</h1>
            <div class="final-score" style="font-size: 6rem;">${goals} - ${rivalGoals}</div>
            
            <div style="background: rgba(255,157,0,0.1); padding: 20px; border: 1px solid var(--psp-orange); margin-bottom: 30px; width: 300px;">
                <span style="display:block; font-size: 1rem; color: #a0aec0;">MEDIA IQ PONDERADA</span>
                <span style="font-size: 3.5rem; font-family: 'Orbitron'; color: var(--psp-orange);">${mediaIQGlobal}</span>
            </div>

            <div class="stat-row"><span>PARTIDOS JUGADOS:</span> <span>${historialIQ.length}</span></div>
            <div class="stat-row"><span>ACIERTOS TOTALES:</span> <span>${totalAciertos}</span></div>

            <button class='opt-btn' style="margin-top:30px;" onclick='location.reload()'><span>VOLVER AL VESTUARIO</span></button>
        </div>`;
}
function calcularIQFinal() {
    if (puntosPrestigioMaximosPosibles === 0) return 0;

    // Calculamos la eficiencia base
    let eficiencia = puntosPrestigioActual / puntosPrestigioMaximosPosibles;

    // Escalamos a 200. 
    // Si tienes 100% de eficiencia, tienes 200 IQ.
    let iqPartida = Math.round(eficiencia * 200);

    // Añadimos un "Bono de Scouting" por dificultad media:
    // Si te han salido muchas preguntas difíciles, te damos un extra de hasta +50 o +100
    // Esto permite que el techo real sea 300.
    let dificultadMedia = puntosPrestigioMaximosPosibles / (totalQuestions * 10); 
    let bonoDificultad = Math.round((dificultadMedia - 0.5) * 200); // Ajustable
    
    iqPartida += Math.max(0, bonoDificultad);

    historialIQ.push(iqPartida);
    localStorage.setItem('historialIQ', JSON.stringify(historialIQ));
    return iqPartida;
}
let myChart = null;

function toggleGrafico() {
    const container = document.getElementById('chart-container');
    
    if (container.style.display === 'none') {
        container.style.display = 'block';
        renderizarGrafico();
    } else {
        container.style.display = 'none';
    }
}

function renderizarGrafico() {
    const ctx = document.getElementById('iqChart').getContext('2d');
    
    // Calcular media acumulada progresiva
    let sumaTemporal = 0;
    const datosMediaProgresiva = historialIQ.map((valor, index) => {
        sumaTemporal += valor;
        return Math.round(sumaTemporal / (index + 1));
    });

    if (window.myChart) window.myChart.destroy();

    window.myChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: historialIQ.map((_, i) => `P${i + 1}`),
            datasets: [
                {
                    label: 'Tu Media IQ',
                    data: datosMediaProgresiva,
                    borderColor: '#ff9d00',
                    backgroundColor: 'rgba(255, 157, 0, 0.1)',
                    borderWidth: 3,
                    tension: 0.2,
                    fill: true
                },
                {
                    label: 'Límite Leyenda (250)',
                    data: Array(historialIQ.length).fill(250), // Línea en los 300
                    borderColor: 'rgba(231, 76, 60, 0.5)', 
                    borderDash: [10, 5], // Línea punteada
                    borderWidth: 2,
                    pointRadius: 0, // No queremos puntos en esta línea
                }
            ]
        },
options: {
    responsive: true,
    scales: {
        y: { 
            beginAtZero: true, 
            min: 0, 
            max: 250, // Ahora el tope es 300 exacto
            ticks: { 
                color: '#aaa', 
                font: { family: 'Orbitron' },
                stepSize: 50 // Esto fuerza: 0, 50, 100, 150, 200, 250, 300
            },
            grid: { color: '#222' } 
        },
        x: { 
            ticks: { color: '#aaa' },
            grid: { display: false } 
        }
    },
    plugins: {
        legend: { labels: { color: '#fff', font: { family: 'Barlow Condensed' } } }
    }
}
    });
}

function borrarHistorial() {
    if (confirm("¿Seguro que quieres borrar toda tu carrera de Scouting? Esto no se puede deshacer.")) {
        localStorage.removeItem('historialIQ');
        historialIQ = [];
        location.reload(); // Recargamos para que el IQ vuelva a "No definido"
    }
}
    // Esto se ejecuta SOLITO cada vez que se abre el juego o se recarga
window.onload = async function() {
    // Lógica de IQ que ya tenías
    const media = calcularMediaGlobal();
    const display = document.getElementById('iq-valor-inicio');
    if (display) {
        display.innerText = media;
    }

    // Pre-carga asíncrona para que el Kick Off sea instantáneo
    await cargarPreguntasDeArchivo();
};
</script>
